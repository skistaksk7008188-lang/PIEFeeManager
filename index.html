<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIE Institute Fee Management</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="topBar">

<div>

<h1>PIE Institute</h1>
<p>Fee Management System</p>

</div>

<button id="settingsBtn" class="settings-btn">
⚙️
</button>

</div>
<div class="dashboard">

<div class="card">
<h3 id="totalStudents">0</h3>
<p>Total Students</p>
</div>

<div class="card">
<h3 id="totalReceipts">0</h3>
<p>Total Receipts</p>
</div>

<div class="card">
<h3 id="totalAmount">₹0</h3>
<p>Total Collection</p>
</div>

</div>
<form id="feeForm">

<label>Student Name</label>
<input type="text" id="studentName" required>

<label>Roll Number</label>
<input type="number" id="roll" required>

<label>Parent Mobile</label>
<input type="tel" id="mobile" required>

<label>Class</label>
<select id="class">
<option>Class 11</option>
<option>Class 12</option>
</select>

<label>Month</label>
<select id="month">
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<label>Amount</label>
<input type="number" id="amount" required>

<label>Received By</label>
<input type="text" id="teacher" required>

<label>Date</label>
<input type="date" id="date">

<button type="submit">Save Receipt</button>

</form>

<div id="receipt"></div>
  <button id="printBtn" style="display:none;">
🖨️ Print Receipt
  </button>
  <input
type="text"
id="search"
placeholder="Search by Name or Roll"
style="width:100%;padding:12px;margin-top:20px;border:1px solid #ccc;border-radius:8px;">
  <select id="reportMonth">
<option value="">Select Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<button id="reportBtn">
📊 Monthly Report
</button>
<h2 style="margin-top:25px;">Receipt History</h2>
<button id="backupBtn">💾 Backup Data</button>

<input
type="file"
id="restoreFile"
accept=".json"
style="display:none;">

<button id="restoreBtn">📂 Restore Data</button>
<div id="history"></div>
</div>

<!-- Admin Password Popup -->
<div id="passwordModal" class="modal">

  <div class="modal-box">

    <h2>🔒 Admin Login</h2>

    <input
      type="password"
      id="adminPassword"
      placeholder="Enter Password">

    <div class="modal-buttons">

      <button id="cancelBtn">Cancel</button>

      <button id="loginBtn">Login</button>

    </div>

  </div>

</div>

  <!-- Settings Popup -->
<div id="settingsModal" class="modal">

  <div class="modal-box">

    <h2>⚙️ Settings</h2>

    <label>Current Password</label>
    <input type="password" id="oldPassword">

    <label>New Password</label>
    <input type="password" id="newPassword">

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword">

    <div class="modal-buttons">
      <button id="closeSettings">Close</button>
      <button id="changePasswordBtn">Save</button>
    </div>

  </div>

</div>
<script src="script.js"></script>

</body>
</html>
